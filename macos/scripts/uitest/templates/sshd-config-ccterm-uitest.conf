# Installed by macos/scripts/uitest/setup.sh.
#
# Whitelist policy: only cctermtest, only from loopback. Any other user (incl.
# the workstation's primary admin) and any non-loopback source is rejected
# at the sshd protocol level — sshd refuses the connection before even
# attempting PAM / authentication. This is the strictest available stance
# short of disabling Remote Login entirely.

AllowUsers cctermtest@127.0.0.1 cctermtest@::1

Match User cctermtest
    PasswordAuthentication no
    KbdInteractiveAuthentication no
    AuthenticationMethods publickey
    X11Forwarding no
    AllowTcpForwarding no
    AllowAgentForwarding no
    PermitTunnel no
    PermitTTY yes
